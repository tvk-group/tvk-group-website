    <h2>Informativa sulla Privacy</h2>
    <p><strong>Data di efficacia:</strong> Maggio 2025</p>

    <h3>1. Introduzione</h3>
    <p>TVK Group Holding LTD ("noi", "nostro" o "TVK Group") si impegna a proteggere la tua privacy e a fornire trasparenza su come raccogliamo, utilizziamo, archiviamo e condividiamo i tuoi dati. Questa politica definisce i tuoi diritti e i nostri obblighi.</p>

    <h3>2. Informazioni raccolte</h3>
    <ul>
      <li>Identificatori personali (nome, email, paese)</li>
      <li>Indirizzi wallet blockchain</li>
      <li>Informazioni sul dispositivo (IP, tipo di browser, ID dispositivo)</li>
      <li>Comportamento d'uso (interazioni, dati sessione)</li>
      <li>Informazioni fornite volontariamente (moduli, iscrizioni, KYC)</li>
      <li>Hash biometrici (Q-Presence, nessun dato biometrico grezzo)</li>
    </ul>

    <h3>3. Finalità del trattamento</h3>
    <ul>
      <li>Fornire e migliorare i nostri servizi Web3</li>
      <li>Adempiere a contratti relativi a staking, NFT, smart contract</li>
      <li>Comunicare aggiornamenti, notifiche legali e coinvolgimento della community</li>
      <li>Analisi e sicurezza della piattaforma</li>
      <li>Obblighi legali internazionali (UK, UAE, UE)</li>
    </ul>

    <h3>4. Basi giuridiche</h3>
    <ul>
      <li>Consenso</li>
      <li>Esecuzione di un contratto</li>
      <li>Obblighi legali</li>
      <li>Interessi legittimi</li>
    </ul>

    <h3>5. Condivisione dei dati</h3>
    <ul>
      <li>Non vendiamo dati personali</li>
      <li>Condivisi con sussidiarie interne (es. T.V.K. Labs LTD)</li>
      <li>Provider Web3 (es. IPFS, Infura)</li>
      <li>Autorità regolatorie dove richiesto</li>
      <li>Registrazioni su blockchain pubblica</li>
    </ul>

    <h3>6. Conservazione dei dati</h3>
    <p>I dati vengono conservati solo per il tempo necessario e secondo le normative. I dati su blockchain possono rimanere immutabili.</p>

    <h3>7. Sicurezza dei dati</h3>
    <ul>
      <li>Crittografia end-to-end</li>
      <li>Cold storage</li>
      <li>Hashing e zero-knowledge proof</li>
      <li>Audit regolari</li>
    </ul>

    <h3>8. Diritti dell'utente</h3>
    <ul>
      <li>Accesso ai dati</li>
      <li>Correzione dei dati</li>
      <li>Revoca del consenso</li>
      <li>Richiesta di cancellazione</li>
      <li>Opposizione al trattamento o portabilità</li>
    </ul>

    <h3>9. Cookie e tracciatori</h3>
    <p>Usiamo solo cookie essenziali per analisi delle prestazioni. Nessun tracciamento pubblicitario di terze parti.</p>

    <h3>10. Trasferimenti internazionali</h3>
    <p>I tuoi dati possono essere trattati in UK, UAE o altre giurisdizioni con adeguate misure di sicurezza.</p>

    <h3>11. Dati dei minori</h3>
    <p>Non raccogliamo intenzionalmente dati da minori sotto i 16 anni. Ava Santé e Alvina operano localmente senza trasmissione dati.</p>

    <h3>12. Aggiornamenti alla politica</h3>
    <p>Questa politica può essere aggiornata periodicamente. Le modifiche verranno comunicate se richiesto dalla legge.</p>
