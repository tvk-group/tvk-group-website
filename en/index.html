  <!-- 🌐 Consent-based Language Redirect Script -->
  <script>
  (function() {
    const supportedLanguages = {
      ar: '/ar/index.html', zh: '/zh/index.html', da: '/da/index.html', nl: '/nl/index.html',
      en: '/en/index.html', fr: '/fr/index.html', de: '/de/index.html', he: '/he/index.html',
      hi: '/hi/index.html', it: '/it/index.html', ja: '/ja/index.html', ko: '/ko/index.html',
      pl: '/pl/index.html', pt: '/pt/index.html', ru: '/ru/index.html', es: '/es/index.html',
      sv: '/sv/index.html', tr: '/tr/index.html'
    };

    const defaultLang = 'en';
    const currentPath = window.location.pathname;
    const isInLangFolder = /^\\/(ar|zh|da|nl|en|fr|de|he|hi|it|ja|ko|pl|pt|ru|es|sv|tr)\\//.test(currentPath);

    function showConsentBar(targetUrl) {
      const bar = document.createElement('div');
      bar.style.position = 'fixed';
      bar.style.bottom = '0';
      bar.style.left = '0';
      bar.style.right = '0';
      bar.style.background = '#222';
      bar.style.color = '#fff';
      bar.style.padding = '12px';
      bar.style.textAlign = 'center';
      bar.style.zIndex = '10000';
      bar.innerHTML = `
        🌐 We've detected your language. Redirect to your preferred version?
        <button id="lang-accept" style="margin-left:10px;padding:5px 12px;">Yes</button>
      `;
      document.body.appendChild(bar);
      document.getElementById('lang-accept').onclick = () => {
        bar.remove();
        window.location.href = targetUrl;
      };
    }

    const savedLang = localStorage.getItem('preferredLanguage');
    let targetUrl = null;

    if (!isInLangFolder) {
      if (savedLang && supportedLanguages[savedLang]) {
        targetUrl = supportedLanguages[savedLang];
      } else {
        const browserLang = navigator.language.slice(0, 2).toLowerCase();
        targetUrl = supportedLanguages[browserLang] || supportedLanguages[defaultLang];
        localStorage.setItem('preferredLanguage', browserLang in supportedLanguages ? browserLang : defaultLang);
      }

      window.addEventListener('DOMContentLoaded', () => showConsentBar(targetUrl));
    }

    document.addEventListener("DOMContentLoaded", function() {
      const langDropdown = document.getElementById("lang-dropdown");
      if (langDropdown) {
        langDropdown.addEventListener("change", function() {
          const selectedLang = this.value.split("/")[1];
          localStorage.setItem('preferredLanguage', selectedLang);
        });
      }
    });
  })();
  </script>
